<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yonsei Mind & Memory Research Initiative - Workshop</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="icon" type="image/x-icon" href="./images/yonsei-logo.png">
</head>
<body>

  <!-- ── Hero ── -->
  <section class="hero">
    <p class="eyebrow">Yonsei University</p>
    <h1><em>Mind and Memory</em><br>Research Initiative</h1>
    <hr class="gold-rule" />
  </section>

<div class="container">

	<h1 style="padding-top:40px;">Workshop Series</h1>
	
      <p style="padding-top:40px;">
	The <span class="gold">Yonsei Mind and Memory Workshop</span> is a yearly workshop that brings together scholars working on the philosophy of mind and memory to present their work at Yonsei University.

      </p>

      <div class="poster-frame">
        <p class="poster-label">Yonsei Mind and Memory Workshop 2026</p>
        <a href="images/ymmws.png" target="_blank">
          <img src="images/ymmws.png" alt="Yonsei Mind and Memory Workshop poster" />
        </a>
      </div>

</div>

  <script src="./js/nav.js"></script>
  <script>
    function toggleAbstract(btn) {
      const abstract = btn.previousElementSibling;
      const collapsed = abstract.classList.toggle('collapsed');
      btn.textContent = collapsed ? 'Read more ↓' : 'Read less ↑';
    }
  </script>

</body>
</html>
